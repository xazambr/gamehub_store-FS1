spring.application.name=msvc-notifications
server.port=8008

spring.datasource.url=jdbc:h2:file:./data/notificaciones
spring.datasource.driver-class-name=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=sa

spring.jpa.database-platform=org.hibernate.dialect.H2Dialect
spring.jpa.hibernate.ddl-auto=update

# Consola de administración de H2
spring.h2.console.enabled=true
spring.h2.console.path=/h2-console

# Registro en Eureka. spring.application.name (arriba) es el nombre con que queda registrado.
eureka.client.service-url.defaultZone=http://localhost:8761/eureka/
eureka.instance.prefer-ip-address=true
