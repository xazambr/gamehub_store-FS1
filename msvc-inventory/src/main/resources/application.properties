spring.application.name=msvc-inventory
server.port=8004

spring.datasource.url=jdbc:h2:file:./data/inventario
spring.datasource.driver-class-name=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=sa

spring.jpa.database-platform=org.hibernate.dialect.H2Dialect
spring.jpa.hibernate.ddl-auto=update

# Consola de administración de H2
spring.h2.console.enabled=true
spring.h2.console.path=/h2-console

# Documentacion Swagger
springdoc.api-docs.enabled=true
springdoc.swagger-ui.enabled=true
springdoc.swagger-ui.path=/docs/swagger-ui.html

# Registro en Eureka. spring.application.name (arriba) es el nombre con que queda registrado.
eureka.client.service-url.defaultZone=http://localhost:8761/eureka/
eureka.instance.prefer-ip-address=true

jwt.secret=clave-secreta-super-segura-para-jwt-gamehub-msvc-duoc-2026-0616
jwt.expiration-minutes=60